[tools]
rust = "stable"
node = "lts"
bun = "1.3.10"
gh = "latest"
opentofu = "latest"
git-cliff = "latest"
cocogitto = "latest"

[tasks.install]
description = "Install or update tool versions from mise.toml"
run = "mise install"

[tasks.build]
description = "Build Rust crates and admin UI bundle"
depends = ["ui-install"]
run = "cargo build --workspace && bun run --cwd crates/admin-ui/web build"

[tasks.check]
description = "Compile Rust targets and verify admin UI builds"
depends = ["ui-install"]
run = "cargo check --workspace --all-targets && bun run --cwd crates/admin-ui/web build"

[tasks.test]
description = "Run Rust and admin UI tests"
depends = ["ui-install"]
run = "cargo test --workspace && bun run --cwd crates/admin-ui/web test"

[tasks.fmt]
description = "Format Rust sources"
run = "cargo fmt --all"

[tasks.lint]
description = "Run Rust and admin UI linting"
depends = ["ui-install"]
run = "cargo clippy --workspace --all-targets -- -D warnings && bun run --cwd crates/admin-ui/web lint"

[tasks.run]
description = "Run the gateway binary"
run = "cargo run -p gateway --bin gateway"

[tasks.sync-pricing-catalog]
description = "Refresh the vendored pricing catalog fallback snapshot"
run = "cargo run -p gateway --bin sync_pricing_catalog"

[tasks.ui-install]
description = "Install admin UI dependencies"
run = "bun install --cwd crates/admin-ui/web --frozen-lockfile"

[tasks.ui-check]
description = "Install, lint, test, and build admin UI"
depends = ["ui-install"]
run = [{ task = "ui-lint" }, { task = "ui-test" }, { task = "ui-build" }]

[tasks.ui-dev]
description = "Run admin UI dev server"
run = "bun run --cwd crates/admin-ui/web dev"

[tasks.ui-build]
description = "Build admin UI"
run = "bun run --cwd crates/admin-ui/web build"

[tasks.ui-lint]
description = "Lint admin UI"
run = "bun run --cwd crates/admin-ui/web lint"

[tasks.ui-fmt]
description = "Format admin UI"
run = "bun run --cwd crates/admin-ui/web fmt"

[tasks.ui-test]
description = "Run admin UI tests"
run = "bun run --cwd crates/admin-ui/web test"

[tasks.release]
description = "Analyze commits and dispatch the release workflow when a release is pending"
env = { GITHUB_TOKEN = { required = true } }
# Cocogitto is used purely for version bumping and publishing tags.
# git-cliff, might be able to replace it entirely, but failed when an initial tag didn't exist.
# Requires GITHUB_TOKEN to be set in the environment to avoid rate limits
run = [
  "cog bump --auto --skip-untracked",
  "git-cliff -o CHANGELOG.md",
  # GitHub release with version specific notes (git-cliff)
  'gh release create v$(cog get-version) --notes "$(git-cliff --tag v$(cog get-version) --latest --strip header)"',
  # Bump package Cargo.toml versions
  "cargo release version $(cog get-version) --execute",
]


[tasks.release-dry-run]
description = "Validate semantic-release configuration in dry-run mode"
env = { GITHUB_TOKEN = { required = true } }
run = [
  "cog bump --auto --dry-run --skip-untracked",
  "git-cliff --dry-run --offline",
]

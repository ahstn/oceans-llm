experimental_monorepo_root = true

[settings]
experimental = true
env_shell_expand = true

[monorepo]
config_roots = ["docs", "crates/gateway-store"]

[tools]
rust = "stable"
node = "lts"
bun = "1.3.13"
postgres = { version = "17", os = ["macos"] } # skip for ci
gh = "latest"
helm = "latest"
opentofu = "latest"
git-cliff = "latest"
cocogitto = "latest"
prek = "latest"
"npm:agent-browser" = "latest"

[env]
CARGO_TARGET_DIR = "$HOME/.cache/cargo/target/"
CARGO_BUILD_BUILD_DIR = "$HOME/.cache/cargo/build/"

[tasks.install]
description = "Install or update tool versions from mise.toml"
run = "mise install"

[tasks.helm-dependency-update]
description = "Update Helm chart dependencies"
run = "helm dependency update deploy/helm/oceans-llm"

[tasks.helm-lint]
description = "Lint the Oceans LLM Helm chart"
depends = ["helm-dependency-update"]
run = "helm lint deploy/helm/oceans-llm --set database.external.existingSecret.name=oceans-llm-postgres"

[tasks.helm-template]
description = "Render the Oceans LLM Helm chart examples"
depends = ["helm-dependency-update"]
run = """
set -eu

chart_dir="deploy/helm/oceans-llm"

helm template oceans-llm "$chart_dir" --set database.external.existingSecret.name=oceans-llm-postgres >/dev/null
for values_file in "$chart_dir"/examples/*.yaml; do
  helm template oceans-llm "$chart_dir" --values "$values_file" >/dev/null
done
"""

[tasks.helm-check]
description = "Run Helm dependency, lint, and template checks"
depends = ["helm-lint", "helm-template"]
run = "true"

[tasks.fmt]
description = "Format Rust sources"
run = "cargo fmt --all"

[tasks.admin-contract-generate]
description = "Generate the checked-in admin OpenAPI artifact and TypeScript contract"
depends = ["ui-install"]
run = """
cargo run -p gateway --bin export_admin_openapi -- crates/gateway/openapi/admin-api.json
bun run --cwd crates/admin-ui/web generate:admin-api
"""

[tasks.admin-contract-check]
description = "Verify generated admin contract artifacts are up to date"
depends = ["ui-install"]
run = """
set -euo pipefail

tmpdir="$(mktemp -d)"
trap 'rm -rf "$tmpdir"' EXIT

cargo run -p gateway --bin export_admin_openapi -- "$tmpdir/admin-api.json"
bun run --cwd crates/admin-ui/web openapi-typescript "$tmpdir/admin-api.json" -o "$tmpdir/admin-api.ts"

diff -u crates/gateway/openapi/admin-api.json "$tmpdir/admin-api.json"
diff -u crates/admin-ui/web/src/generated/admin-api.ts "$tmpdir/admin-api.ts"
"""

[tasks.lint]
description = "Run Rust and admin UI linting"
depends = ["ui-install", "review-agent-action-install"]
run = "cargo clippy --workspace --all-targets -- -D warnings && bun run --cwd crates/admin-ui/web lint && mise run review-agent-action-check"

[tasks.build]
description = "Build Rust crates and admin UI bundle"
depends = ["ui-install", "fmt", "lint"]
run = "cargo build --workspace && bun run --cwd crates/admin-ui/web build"

[tasks.run]
description = "Run `gateway serve`"
run = "cargo run -p gateway --bin gateway -- serve"

[tasks.test]
description = "Run Rust and admin UI tests"
depends = ["ui-install", "review-agent-action-install"]
run = "cargo test --workspace && bun run --cwd crates/admin-ui/web test && mise run review-agent-action-test"

[tasks.gateway-serve]
description = "Run local `gateway serve` against `gateway.yaml`"
run = "cargo run -p gateway --bin gateway -- serve"

[tasks.gateway-migrate]
description = "Run local `gateway migrate --apply` against `gateway.yaml`"
run = "cargo run -p gateway --bin gateway -- migrate --apply"

[tasks.gateway-bootstrap-admin]
description = "Run local `gateway bootstrap-admin` against `gateway.yaml`"
run = "cargo run -p gateway --bin gateway -- bootstrap-admin"

[tasks.gateway-seed-config]
description = "Run local `gateway seed-config` against `gateway.yaml`"
run = "cargo run -p gateway --bin gateway -- seed-config"

[tasks.gateway-purge-request-logs-dry-run]
description = "Preview request-log purge against `gateway.yaml`; override retention with RETENTION=1d|3d|7d"
run = 'cargo run -p gateway --bin gateway -- purge-request-logs --retention "${RETENTION:-7d}" --dry-run'

[tasks.gateway-purge-request-logs]
description = "Purge old request logs against `gateway.yaml`; override retention with RETENTION=1d|3d|7d"
run = 'cargo run -p gateway --bin gateway -- purge-request-logs --retention "${RETENTION:-7d}"'

[tasks.gateway-purge-request-logs-dry-run-prod]
description = "Preview request-log purge against `gateway.prod.yaml`; override retention with RETENTION=1d|3d|7d"
env = { POSTGRES_URL = { required = true } }
run = 'cargo run -p gateway --bin gateway -- --config gateway.prod.yaml purge-request-logs --retention "${RETENTION:-7d}" --dry-run'

[tasks.gateway-purge-request-logs-prod]
description = "Purge old request logs against `gateway.prod.yaml`; override retention with RETENTION=1d|3d|7d"
env = { POSTGRES_URL = { required = true } }
run = 'cargo run -p gateway --bin gateway -- --config gateway.prod.yaml purge-request-logs --retention "${RETENTION:-7d}"'

[tasks.gateway-seed-local-demo]
description = "Seed the local-only demo dataset (teams, users, budgets, api keys, request history) against `gateway.yaml`"
run = "cargo run -p gateway --bin gateway -- seed-local-demo"

[tasks.gateway-reset-local-demo]
description = "Recreate local `gateway.db` with the local-only demo dataset"
run = "rm -f gateway.db && cargo run -p gateway --bin gateway -- seed-local-demo"

[tasks.gateway-serve-prod]
description = "Run production-shaped local `gateway serve` against `gateway.prod.yaml`"
env = { POSTGRES_URL = { required = true } }
run = "cargo run -p gateway --bin gateway -- --config gateway.prod.yaml serve"

[tasks.gateway-migrate-prod]
description = "Run `gateway migrate --apply` against `gateway.prod.yaml`"
env = { POSTGRES_URL = { required = true } }
run = "cargo run -p gateway --bin gateway -- --config gateway.prod.yaml migrate --apply"

[tasks.gateway-bootstrap-admin-prod]
description = "Run `gateway bootstrap-admin` against `gateway.prod.yaml`"
env = { POSTGRES_URL = { required = true } }
run = "cargo run -p gateway --bin gateway -- --config gateway.prod.yaml bootstrap-admin"

[tasks.gateway-seed-config-prod]
description = "Run `gateway seed-config` against `gateway.prod.yaml`"
env = { POSTGRES_URL = { required = true } }
run = "cargo run -p gateway --bin gateway -- --config gateway.prod.yaml seed-config"

[tasks.dev-stack]
description = "Run the local dev stack via mise (gateway + admin UI dev server)"
depends = ["ui-install"]
run = """
set -euo pipefail

ROOT_DIR="$PWD"
WEB_DIR="$ROOT_DIR/crates/admin-ui/web"
GATEWAY_PORT="${PORT:-8080}"
ADMIN_UI_INTERNAL_PORT="${ADMIN_UI_INTERNAL_PORT:-3001}"
ADMIN_UI_UPSTREAM="${ADMIN_UI_UPSTREAM:-http://localhost:${ADMIN_UI_INTERNAL_PORT}}"

if [[ ! -f "$ROOT_DIR/gateway.db" ]]; then
  cargo run -p gateway --bin gateway -- seed-local-demo
fi


cleanup() {
  if [[ -n "${UI_PID:-}" ]]; then
    kill "$UI_PID" >/dev/null 2>&1 || true
  fi
}

trap cleanup EXIT INT TERM

bun run --cwd "$WEB_DIR" dev -- --port "$ADMIN_UI_INTERNAL_PORT" &
UI_PID=$!

ADMIN_UI_UPSTREAM="$ADMIN_UI_UPSTREAM" PORT="$GATEWAY_PORT" cargo run -p gateway --bin gateway -- serve
"""

[tasks.prod-stack]
description = "Run the production-shaped local stack via mise (gateway + admin UI SSR server)"
depends = ["ui-install"]
env = { POSTGRES_URL = { required = true } }
run = """
set -euo pipefail

ROOT_DIR="$PWD"
WEB_DIR="$ROOT_DIR/crates/admin-ui/web"
GATEWAY_PORT="${PORT:-8080}"
ADMIN_UI_INTERNAL_PORT="${ADMIN_UI_INTERNAL_PORT:-3001}"
ADMIN_UI_UPSTREAM="${ADMIN_UI_UPSTREAM:-http://localhost:${ADMIN_UI_INTERNAL_PORT}}"

cleanup() {
  if [[ -n "${UI_PID:-}" ]]; then
    kill "$UI_PID" >/dev/null 2>&1 || true
  fi
}

trap cleanup EXIT INT TERM

PORT="$ADMIN_UI_INTERNAL_PORT" bun run --cwd "$WEB_DIR" start &
UI_PID=$!

ADMIN_UI_UPSTREAM="$ADMIN_UI_UPSTREAM" PORT="$GATEWAY_PORT" cargo run -p gateway --bin gateway -- --config gateway.prod.yaml serve
"""

[tasks.sync-pricing-catalog]
description = "Refresh the vendored pricing catalog fallback snapshot"
run = "cargo run -p gateway --bin sync_pricing_catalog"

[tasks.ui-install]
description = "Install admin UI dependencies"
run = "bun install --cwd crates/admin-ui/web --frozen-lockfile"

[tasks.ui-check]
description = "Install, lint, test, and build admin UI"
depends = ["ui-install"]
run = [{ task = "ui-lint" }, { task = "ui-test" }, { task = "ui-build" }]

[tasks.ui-dev]
description = "Run admin UI dev server"
run = "bun run --cwd crates/admin-ui/web dev"

[tasks.ui-build]
description = "Build admin UI"
depends = ["ui-install"]
run = "bun run --cwd crates/admin-ui/web build"

[tasks.ui-lint]
description = "Lint admin UI"
run = "bun run --cwd crates/admin-ui/web lint"

[tasks.ui-fmt]
description = "Format admin UI"
run = "bun run --cwd crates/admin-ui/web fmt"

[tasks.ui-test]
description = "Run admin UI tests"
run = "bun run --cwd crates/admin-ui/web test"

[tasks.review-agent-action-install]
description = "Install review agent action dependencies"
run = "bun install --cwd actions/review-agent --frozen-lockfile"

[tasks.review-agent-action-build]
description = "Build the checked-in review agent action dist bundle"
depends = ["review-agent-action-install"]
run = "bun run --cwd actions/review-agent build"

[tasks.review-agent-action-test]
description = "Run review agent action unit tests"
depends = ["review-agent-action-install"]
run = "bun run --cwd actions/review-agent test"

[tasks.review-agent-action-check]
description = "Typecheck, test, verify dist, and smoke test the review agent action"
depends = ["review-agent-action-install"]
run = """
bun run --cwd actions/review-agent typecheck
bun run --cwd actions/review-agent test
bun run --cwd actions/review-agent check:dist
bun run --cwd actions/review-agent smoke:no-install
"""

[tasks.e2e-install]
description = "Install Playwright Chromium for the end-to-end suite"
depends = ["ui-install"]
run = "bun run --cwd crates/admin-ui/web playwright:install"

[tasks.e2e-gateway-build]
description = "Build the gateway binary before Playwright starts the E2E stack"
run = "cargo build -p gateway --bin gateway"

[tasks.e2e-test]
description = "Run gateway and admin UI end-to-end contract tests"
depends = ["ui-build", "e2e-install", "e2e-gateway-build"]
run = "bun run --cwd crates/admin-ui/web test:e2e"

[tasks.release]
description = "Analyze commits and dispatch the release workflow when a release is pending"
depends = ["sync-pricing-catalog"]
env = { GITHUB_TOKEN = { required = true } }
# Cocogitto is used purely for version bumping and publishing tags.
# git-cliff, might be able to replace it entirely, but failed when an initial tag didn't exist.
# Requires GITHUB_TOKEN to be set in the environment to avoid rate limits
run = [
  "cog bump --auto --skip-untracked",
  "git-cliff -o CHANGELOG.md",
  # GitHub release with version specific notes (git-cliff)
  'gh release create v$(cog get-version) --notes "$(git-cliff --tag v$(cog get-version) --latest --strip header)"',
  # Bump package Cargo.toml versions
  "cargo release version $(cog get-version) --execute",
]


[tasks.release-dry-run]
description = "Validate semantic-release configuration in dry-run mode"
env = { GITHUB_TOKEN = { required = true } }
run = [
  "cog bump --auto --dry-run --skip-untracked",
  "git-cliff --dry-run --offline",
]

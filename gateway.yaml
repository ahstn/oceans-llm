server:
  bind: "0.0.0.0:8080"
  log_format: "pretty"

database:
  path: "./gateway.db"

auth:
  seed_api_keys: []
  bootstrap_admin:
    enabled: true
    email: admin@local
    password: literal.admin
    require_password_change: false

request_logging:
  payloads:
    capture_mode: redacted_payloads
    request_max_bytes: 65536
    response_max_bytes: 65536
    stream_max_events: 128
    redaction_paths: []

teams:

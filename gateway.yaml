providers:
  - id: openai-prod
    type: openai_compat
    base_url: https://api.openai.com/v1
    pricing_provider_id: openai
    auth:
      kind: bearer
      token: env.OPENAI_API_KEY

  - id: openai-secondary
    type: openai_compat
    base_url: https://api.openai.com/v1
    pricing_provider_id: openai
    auth:
      kind: bearer
      token: env.OPENAI_API_KEY_SECONDARY

  - id: vertex-adc
    type: gcp_vertex
    project_id: your-gcp-project
    location: global
    auth:
      mode: adc

  - id: vertex-claude
    type: gcp_vertex
    project_id: your-gcp-project
    location: global
    auth:
      mode: service_account
      credentials_path: /path/to/service-account.json

  - id: bedrock-us-east-1
    type: aws_bedrock
    region: us-east-1
    endpoint_kind: bedrock_runtime
    auth:
      mode: default_chain
    display:
      label: AWS Bedrock
      icon_key: aws

models:
  - id: openai-fast-v2
    description: OpenAI via compatible adapter with weighted route selection
    routes:
      - provider: openai-prod
        upstream_model: gpt-5
        weight: 9.0
      - provider: openai-secondary
        upstream_model: gpt-5
        weight: 1.0

  - id: openai-fast
    description: Alias kept for backward compatibility
    alias_of: openai-fast-v2

  - id: gemini-fast
    description: Gemini on Vertex
    routes:
      - provider: vertex-adc
        upstream_model: google/gemini-2.0-flash

  - id: claude-sonnet
    description: Claude on Vertex
    routes:
      - provider: vertex-claude
        upstream_model: anthropic/claude-sonnet-4-6

  - id: claude-opus
    description: Claude Opus on Vertex
    routes:
      - provider: vertex-claude
        upstream_model: anthropic/claude-opus-4-7

  - id: bedrock-claude-sonnet
    description: Claude Sonnet on AWS Bedrock
    routes:
      - provider: bedrock-us-east-1
        upstream_model: us.anthropic.claude-sonnet-4-6-v1:0
        capabilities:
          responses: false
        compatibility:
          aws_bedrock:
            api_style: runtime_anthropic_invoke

  - id: gpt-oss-120b
    description: OpenAI OSS on AWS Bedrock
    routes:
      - provider: bedrock-us-east-1
        upstream_model: gpt-oss-120b
        capabilities:
          responses: false
        compatibility:
          aws_bedrock:
            api_style: runtime_openai_chat
            openai_base_path: /openai/v1

  - id: gemini-pro-preview
    description: Gemini preview on Vertex
    routes:
      - provider: vertex-adc
        upstream_model: google/gemini-3.1-pro-preview

server:
  bind: "0.0.0.0:8080"
  log_format: "pretty"

database:
  path: "./gateway.db"

auth:
  seed_api_keys: []
  bootstrap_admin:
    enabled: true
    email: admin@local
    password: literal.admin
    require_password_change: false

request_logging:
  payloads:
    capture_mode: redacted_payloads
    request_max_bytes: 65536
    response_max_bytes: 65536
    stream_max_events: 128
    redaction_paths: []

teams:
  - key: platform
    name: Platform
    budget:
      cadence: monthly
      amount_usd: "1000.0000"
      hard_limit: true
      timezone: UTC

  - key: research
    name: Research
    budget:
      cadence: monthly
      amount_usd: "1000.0000"
      hard_limit: true
      timezone: UTC

users:
  - name: Alice Platform Lead
    email: alice@platform.local
    auth_mode: password
    request_logging_enabled: true
    membership:
      team: platform
      role: admin

  - name: Ben Platform Analyst
    email: ben@platform.local
    auth_mode: password
    request_logging_enabled: true
    membership:
      team: platform
      role: member

  - name: Cara Research Lead
    email: cara@research.local
    auth_mode: password
    request_logging_enabled: true
    membership:
      team: research
      role: admin

  - name: Diego Research Analyst
    email: diego@research.local
    auth_mode: password
    request_logging_enabled: true
    membership:
      team: research
      role: member
    budget:
      cadence: daily
      amount_usd: "50.0000"
      hard_limit: true
      timezone: UTC

  - name: Erin Research Analyst
    email: erin@research.local
    auth_mode: password
    request_logging_enabled: true
    membership:
      team: research
      role: member

providers:
  - id: openai-prod
    type: openai_compat
    base_url: https://api.openai.com/v1
    pricing_provider_id: openai
    auth:
      kind: bearer
      token: env.OPENAI_API_KEY

  - id: openai-secondary
    type: openai_compat
    base_url: https://api.openai.com/v1
    pricing_provider_id: openai
    auth:
      kind: bearer
      token: env.OPENAI_API_KEY_SECONDARY

  - id: vertex-adc
    type: gcp_vertex
    project_id: your-gcp-project
    location: global
    auth:
      mode: adc

  - id: vertex-claude
    type: gcp_vertex
    project_id: your-gcp-project
    location: global
    auth:
      mode: service_account
      credentials_path: /path/to/service-account.json

models:
  - id: openai-fast-v2
    description: OpenAI via compatible adapter with weighted route selection
    routes:
      - provider: openai-prod
        upstream_model: gpt-5
        weight: 9.0
      - provider: openai-secondary
        upstream_model: gpt-5
        weight: 1.0

  - id: openai-fast
    description: Alias kept for backward compatibility
    alias_of: openai-fast-v2

  - id: gemini-fast
    description: Gemini on Vertex
    routes:
      - provider: vertex-adc
        upstream_model: google/gemini-2.0-flash

  - id: claude-sonnet
    description: Claude on Vertex
    routes:
      - provider: vertex-claude
        upstream_model: anthropic/claude-sonnet-4-6

{{- $jobsEnabled := or .Values.migrations.enabled .Values.bootstrapAdminJob.enabled .Values.seedConfigJob.enabled -}}
{{- if and $jobsEnabled .Values.secrets.inline (eq (include "oceans-llm.jobNeedsHookConfig" .) "true") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oceans-llm.jobInlineSecretName" . }}
  labels:
    {{- include "oceans-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: job-secret
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-19"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.inline }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}

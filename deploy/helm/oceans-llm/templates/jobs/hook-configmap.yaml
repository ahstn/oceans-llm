{{- $jobsEnabled := or .Values.migrations.enabled .Values.bootstrapAdminJob.enabled .Values.seedConfigJob.enabled -}}
{{- if and $jobsEnabled (eq (include "oceans-llm.jobNeedsHookConfig" .) "true") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oceans-llm.jobConfigMapName" . }}
  labels:
    {{- include "oceans-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: job-config
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  gateway.yaml: |
    {{- toYaml .Values.gateway.config | nindent 4 }}
{{- end }}

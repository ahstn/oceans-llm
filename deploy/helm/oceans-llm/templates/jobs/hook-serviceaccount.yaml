{{- if and .Values.serviceAccount.create (eq (include "oceans-llm.jobNeedsHookConfig" .) "true") }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "oceans-llm.jobServiceAccountName" . }}
  labels:
    {{- include "oceans-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: job-service-account
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-21"
    helm.sh/hook-delete-policy: before-hook-creation
  {{- else }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-21"
    helm.sh/hook-delete-policy: before-hook-creation
  {{- end }}
{{- end }}

{{- $jobsEnabled := or .Values.migrations.enabled .Values.bootstrapAdminJob.enabled .Values.seedConfigJob.enabled -}}
{{- $migrationHook := include "oceans-llm.migrationHook" . -}}
{{- $needsHookConfig := or (and .Values.migrations.enabled (or (contains "pre-install" $migrationHook) (contains "pre-upgrade" $migrationHook))) (and .Values.bootstrapAdminJob.enabled (or (contains "pre-install" .Values.bootstrapAdminJob.hook) (contains "pre-upgrade" .Values.bootstrapAdminJob.hook))) (and .Values.seedConfigJob.enabled (or (contains "pre-install" .Values.seedConfigJob.hook) (contains "pre-upgrade" .Values.seedConfigJob.hook))) -}}
{{- $jobConfigMapName := ternary (printf "%s-job-config" (include "oceans-llm.fullname" .) | trunc 63 | trimSuffix "-") (include "oceans-llm.configMapName" .) $needsHookConfig -}}
{{- $jobInlineSecretName := ternary (printf "%s-job-env" (include "oceans-llm.fullname" .) | trunc 63 | trimSuffix "-") (include "oceans-llm.inlineSecretName" .) $needsHookConfig -}}
{{- if and $jobsEnabled $needsHookConfig }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $jobConfigMapName }}
  labels:
    {{- include "oceans-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: job-config
  annotations:
    helm.sh/hook: pre-install,pre-upgrade,post-install,post-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  gateway.yaml: |
    {{- toYaml .Values.gateway.config | nindent 4 }}
{{- if .Values.secrets.inline }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $jobInlineSecretName }}
  labels:
    {{- include "oceans-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: job-secret
  annotations:
    helm.sh/hook: pre-install,pre-upgrade,post-install,post-upgrade
    helm.sh/hook-weight: "-19"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.inline }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- if .Values.migrations.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-migrate" (include "oceans-llm.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "oceans-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: {{ $migrationHook | quote }}
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: {{ .Values.migrations.hookDeletePolicy | quote }}
    {{- with .Values.migrations.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "oceans-llm.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
      {{- with .Values.migrations.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "oceans-llm.serviceAccountName" . }}
      containers:
        - name: migrate
          image: {{ include "oceans-llm.gatewayImage" . | quote }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          command: ["gateway"]
          args: ["migrate", "--apply"]
          env:
            {{- include "oceans-llm.jobEnv" . | nindent 12 }}
          {{- $envFrom := include "oceans-llm.jobEnvFrom" . }}
          {{- if or $envFrom .Values.secrets.inline }}
          envFrom:
            {{- $envFrom | nindent 12 }}
            {{- if .Values.secrets.inline }}
            - secretRef:
                name: {{ $jobInlineSecretName | quote }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: gateway-config
              mountPath: {{ .Values.gateway.configMountPath | quote }}
              subPath: gateway.yaml
              readOnly: true
          {{- with .Values.migrations.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: gateway-config
          configMap:
            name: {{ $jobConfigMapName }}
            items:
              - key: gateway.yaml
                path: gateway.yaml
{{- end }}
{{- if .Values.bootstrapAdminJob.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-bootstrap-admin" (include "oceans-llm.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "oceans-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap-admin
  annotations:
    helm.sh/hook: {{ .Values.bootstrapAdminJob.hook | quote }}
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: {{ .Values.bootstrapAdminJob.hookDeletePolicy | quote }}
    {{- with .Values.bootstrapAdminJob.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.bootstrapAdminJob.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.bootstrapAdminJob.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "oceans-llm.labels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap-admin
      {{- with .Values.bootstrapAdminJob.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "oceans-llm.serviceAccountName" . }}
      containers:
        - name: bootstrap-admin
          image: {{ include "oceans-llm.gatewayImage" . | quote }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          command: ["gateway"]
          args: ["bootstrap-admin"]
          env:
            {{- include "oceans-llm.jobEnv" . | nindent 12 }}
          {{- $envFrom := include "oceans-llm.jobEnvFrom" . }}
          {{- if or $envFrom .Values.secrets.inline }}
          envFrom:
            {{- $envFrom | nindent 12 }}
            {{- if .Values.secrets.inline }}
            - secretRef:
                name: {{ $jobInlineSecretName | quote }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: gateway-config
              mountPath: {{ .Values.gateway.configMountPath | quote }}
              subPath: gateway.yaml
              readOnly: true
          {{- with .Values.bootstrapAdminJob.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: gateway-config
          configMap:
            name: {{ $jobConfigMapName }}
            items:
              - key: gateway.yaml
                path: gateway.yaml
{{- end }}
{{- if .Values.seedConfigJob.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-seed-config" (include "oceans-llm.fullname" .) | trunc 63 | trimSuffix "-" }}

database:
  mode: external

externalSecrets:
  enabled: true
  secretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
  targetName: oceans-llm-env
  data:
    - secretKey: POSTGRES_URL
      remoteRef:
        key: /oceans-llm/postgres-url
    - secretKey: GATEWAY_IDENTITY_TOKEN_SECRET
      remoteRef:
        key: /oceans-llm/identity-token-secret
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: /oceans-llm/openai-api-key

server:
  bind: "0.0.0.0:8080"
  log_format: "json"

database:
  kind: postgres
  url: env.POSTGRES_URL

auth:
  bootstrap_admin:
    enabled: true
    email: admin@local
    password: env.GATEWAY_BOOTSTRAP_ADMIN_PASSWORD
    require_password_change: true
  seed_api_keys:
    - name: default
      value: env.GATEWAY_API_KEY

teams:
  - key: platform
    name: Platform
    budget:
      cadence: monthly
      amount_usd: "500.0000"
      hard_limit: true
      timezone: UTC

users:
  - name: Platform Team Admin
    email: ops@example.com
    auth_mode: password
    global_role: user
    request_logging_enabled: true
    membership:
      team: platform
      role: admin
    budget:
      cadence: monthly
      amount_usd: "100.0000"
      hard_limit: true
      timezone: UTC

providers:
  - id: openai-prod
    type: openai_compat
    base_url: https://api.openai.com/v1
    pricing_provider_id: openai
    auth:
      kind: bearer
      token: env.OPENAI_API_KEY

  - id: openai-secondary
    type: openai_compat
    base_url: https://api.openai.com/v1
    pricing_provider_id: openai
    auth:
      kind: bearer
      token: env.OPENAI_API_KEY_SECONDARY

models:
  - id: openai-fast-v2
    description: OpenAI via compatible adapters with weighted routing
    routes:
      - provider: openai-prod
        upstream_model: gpt-5
        weight: 9.0
      - provider: openai-secondary
        upstream_model: gpt-5
        weight: 1.0

  - id: openai-fast
    description: Stable alias for the weighted OpenAI route set
    alias_of: openai-fast-v2

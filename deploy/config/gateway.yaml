server:
  bind: "0.0.0.0:8080"
  log_format: "json"

database:
  kind: postgres
  url: env.POSTGRES_URL

auth:
  seed_api_keys:
    - name: default
      value: env.GATEWAY_API_KEY

providers:
  - id: openai-prod
    type: openai_compat
    base_url: https://api.openai.com/v1
    pricing_provider_id: openai
    auth:
      kind: bearer
      token: env.OPENAI_API_KEY

  - id: openai-secondary
    type: openai_compat
    base_url: https://api.openai.com/v1
    pricing_provider_id: openai
    auth:
      kind: bearer
      token: env.OPENAI_API_KEY_SECONDARY

models:
  - id: openai-fast-v2
    description: OpenAI via compatible adapters with weighted routing
    routes:
      - provider: openai-prod
        upstream_model: gpt-5
        weight: 9.0
      - provider: openai-secondary
        upstream_model: gpt-5
        weight: 1.0

  - id: openai-fast
    description: Alias kept for backward compatibility
    alias_of: openai-fast-v2

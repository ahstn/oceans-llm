server:
  bind: "0.0.0.0:8080"
  log_format: "json"

database:
  kind: postgres
  url: env.POSTGRES_URL

auth:
  bootstrap_admin:
    enabled: true
    email: admin@local
    password: env.GATEWAY_BOOTSTRAP_ADMIN_PASSWORD
    require_password_change: true
  seed_api_keys:
    - name: default
      value: env.GATEWAY_API_KEY
  oidc:
    public_base_url: env.GATEWAY_PUBLIC_BASE_URL
    providers:
      - key: authentik
        label: Authentik
        issuer_url: http://authentik.localhost:9000/application/o/oceans-llm/
        client_id: oceans-llm
        client_secret: env.AUTHENTIK_OCEANS_LLM_CLIENT_SECRET
        scopes:
          - openid
          - email
          - profile
        enabled: false
        jit:
          enabled: false
          global_role: platform_admin
          request_logging_enabled: true
          membership:
            team: platform
            role: admin
  oauth:
    public_base_url: env.GATEWAY_PUBLIC_BASE_URL
    providers:
      - key: github
        label: GitHub
        provider_type: github
        client_id: env.GITHUB_OAUTH_CLIENT_ID
        client_secret: env.GITHUB_OAUTH_CLIENT_SECRET
        scopes:
          - read:user
          - user:email
        # Keep true unless you intentionally accept GitHub primary emails that
        # GitHub has not verified.
        sso_email_verification_enabled: true
        # Optional: restrict GitHub OAuth sign-in, invite activation, and JIT
        # provisioning to primary email domains owned by your organization.
        # allowed_email_domains:
        #   - example.com
        enabled: false
        jit:
          enabled: false
          global_role: user
          request_logging_enabled: true

request_logging:
  payloads:
    capture_mode: redacted_payloads
    request_max_bytes: 65536
    response_max_bytes: 65536
    stream_max_events: 128
    redaction_paths: []

teams:
  - key: platform
    name: Platform

users:
  - name: Platform Admin
    email: ops@example.com
    auth_mode: password
    global_role: platform_admin
    request_logging_enabled: true
    membership:
      team: platform
      role: admin
    budget:
      cadence: monthly
      amount_usd: "100.0000"
      hard_limit: true
      timezone: UTC

providers:
  - id: openai-prod
    type: openai_compat
    base_url: https://api.openai.com/v1
    pricing_provider_id: openai
    auth:
      kind: bearer
      token: env.OPENAI_API_KEY

  - id: openai-secondary
    type: openai_compat
    base_url: https://api.openai.com/v1
    pricing_provider_id: openai
    auth:
      kind: bearer
      token: env.OPENAI_API_KEY_SECONDARY

models:
  - id: openai-fast-v2
    description: OpenAI via compatible adapters with weighted route selection
    routes:
      - provider: openai-prod
        upstream_model: gpt-5
        weight: 9.0
      - provider: openai-secondary
        upstream_model: gpt-5
        weight: 1.0

  - id: openai-fast
    description: Stable alias for the weighted OpenAI route set
    alias_of: openai-fast-v2

name: release-tooling-ci

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_EXPERIMENTAL: true

jobs:
  release-tooling:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup mise + tools
        uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d

      - name: Test release analysis
        run: mise run release-analyze-test

      - name: Dry-run semantic-release
        if: github.event_name == 'push' && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mise run release-semantic-dry-run

      - name: Build gateway image
        run: docker build --file crates/gateway/Dockerfile .

      - name: Build admin UI image
        run: docker build --file crates/admin-ui/web/Dockerfile .

name: release-tooling-ci

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_EXPERIMENTAL: true

jobs:
  release-tooling:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup mise + tools
        uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d

      - name: Test release version calculator
        run: mise run release-version-test

      - name: Validate git-cliff configs
        run: mise run release-cliff-check

      - name: Build gateway image
        run: docker build --file crates/gateway/Dockerfile .

      - name: Build admin UI image
        run: docker build --file crates/admin-ui/web/Dockerfile .

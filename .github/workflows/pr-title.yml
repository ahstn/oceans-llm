name: pr-title

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          pattern='^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([[:alnum:]_.\/-]+\))?(!)?: .+'
          if [[ "$PR_TITLE" =~ $pattern ]]; then
            exit 0
          fi

          echo "Pull request titles must follow Conventional Commits." >&2
          echo "Examples:" >&2
          echo "  feat(gateway): add release version endpoint" >&2
          echo "  fix(admin-ui): correct release digest rendering" >&2
          echo "  chore(ci): pin workflow action SHAs" >&2
          echo "Received: $PR_TITLE" >&2
          exit 1

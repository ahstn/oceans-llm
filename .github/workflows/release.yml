name: release

on:
  push:
    tags:
      - v**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  MISE_EXPERIMENTAL: true
  GATEWAY_IMAGE_NAME: oceans-llm-gateway
  ADMIN_UI_IMAGE_NAME: oceans-llm-admin-ui
  HELM_CHART_NAME: oceans-llm
  HELM_CHART_DIR: deploy/helm/oceans-llm
  HELM_OCI_REGISTRY: ghcr.io/ahstn/charts

jobs:
  build-gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise + tools
        uses: jdx/mise-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract gateway image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ahstn/${{ env.GATEWAY_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Oceans LLM Gateway
            org.opencontainers.image.description=Oceans LLM gateway service
            org.opencontainers.image.version=${{ github.ref_name  }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      # disabling linux/arm64 until we have faster runners
      # local build is 2m but GHA timesout at 45m..
      - name: Build and push gateway image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/gateway/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest gateway image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/ahstn/${{ env.GATEWAY_IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-admin-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise + tools
        uses: jdx/mise-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract admin UI image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ahstn/${{ env.ADMIN_UI_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Oceans LLM Admin UI
            org.opencontainers.image.description=Oceans LLM admin UI service
            org.opencontainers.image.version=${{ github.ref_name  }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push admin UI image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/admin-ui/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest admin UI image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/ahstn/${{ env.ADMIN_UI_IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  publish-helm-chart:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build-gateway
      - build-admin-ui
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise + tools
        uses: jdx/mise-action@v3

      - name: Validate chart
        run: mise run helm-check

      - name: Log in to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package and push Helm chart
        run: |
          set -euo pipefail

          chart_version="${GITHUB_REF_NAME#v}"
          mkdir -p dist/charts

          helm package "$HELM_CHART_DIR" \
            --version "$chart_version" \
            --app-version "$GITHUB_REF_NAME" \
            --destination dist/charts

          helm push "dist/charts/${HELM_CHART_NAME}-${chart_version}.tgz" "oci://${HELM_OCI_REGISTRY}"

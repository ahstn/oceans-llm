name: release

on:
  push:
    tags:
      - v**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  MISE_EXPERIMENTAL: true
  GATEWAY_IMAGE_NAME: oceans-llm-gateway
  ADMIN_UI_IMAGE_NAME: oceans-llm-admin-ui

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise + tools
        uses: jdx/mise-action@v3

      - name: Deploy docs site to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: mise run docs-deploy

  build-gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise + tools
        uses: jdx/mise-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract gateway image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ahstn/${{ env.GATEWAY_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Oceans LLM Gateway
            org.opencontainers.image.description=Oceans LLM gateway service
            org.opencontainers.image.version=${{ github.ref_name  }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      # disabling linux/arm64 until we have faster runners
      # local build is 2m but GHA timesout at 45m..
      - name: Build and push gateway image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/gateway/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest gateway image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/ahstn/${{ env.GATEWAY_IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-admin-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise + tools
        uses: jdx/mise-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract admin UI image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ahstn/${{ env.ADMIN_UI_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Oceans LLM Admin UI
            org.opencontainers.image.description=Oceans LLM admin UI service
            org.opencontainers.image.version=${{ github.ref_name  }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push admin UI image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/admin-ui/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest admin UI image provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/ahstn/${{ env.ADMIN_UI_IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

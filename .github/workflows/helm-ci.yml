name: helm-ci

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MISE_EXPERIMENTAL: true

jobs:
  helm-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise + tools
        uses: jdx/mise-action@v4

      - name: Run Helm checks
        run: mise run helm-check

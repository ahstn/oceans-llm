name: rust-ci

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_EXPERIMENTAL: true

jobs:
  rust-lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: oceans_llm_ci
          POSTGRES_USER: oceans
          POSTGRES_PASSWORD: oceans
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oceans -d oceans_llm_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      POSTGRES_URL: postgres://oceans:oceans@localhost:5432/oceans_llm_ci
      TEST_POSTGRES_URL: postgres://oceans:oceans@localhost:5432/oceans_llm_ci
      OPENAI_API_KEY: test-openai-key
      OPENAI_API_KEY_SECONDARY: test-openai-key-secondary

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup mise + tools
        uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d
        continue-on-err: true # postgres fails in gha env

      - name: Lint Rust workspace
        run: mise exec -- cargo clippy --workspace --all-targets -- -D warnings

      - name: Run `mise run check-rust-postgres`
        run: mise run check-rust-postgres

      - name: Test Rust workspace
        run: mise exec -- cargo test --workspace

      - name: Run `mise run test-rust-postgres`
        run: mise run test-rust-postgres

      - name: Run `mise run test-gateway-postgres-smoke`
        run: mise run test-gateway-postgres-smoke
